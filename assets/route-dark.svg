<svg width="880" height="80" viewBox="0 0 880 80" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Route: fly into the cheaper hub, take the train the rest of the way">
  <path id="fly" d="M40,60 Q330,-28 616,60" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 9" opacity="0.75"/>
  <path id="rail" d="M616,60 L840,60" fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 9" opacity="0.75"/>

  <circle cx="40"  cy="60" r="3.5" fill="#8b949e"/>
  <circle cx="616" cy="60" r="3.5" fill="#8b949e"/>
  <circle cx="840" cy="60" r="3.5" fill="#8b949e"/>

  <g fill="#58a6ff">
    <path d="M0,-4.5 L13,0 L0,4.5 L3.5,0 Z">
      <animateMotion dur="9s" repeatCount="indefinite" rotate="auto" calcMode="linear" keyPoints="0;1;1" keyTimes="0;0.5;1">
        <mpath xlink:href="#fly" href="#fly"/>
      </animateMotion>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.56;1" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>

  <g fill="#3fb950">
    <rect x="-8" y="-4" width="16" height="7" rx="2">
      <animateMotion dur="9s" repeatCount="indefinite" rotate="auto" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.55;0.85;1">
        <mpath xlink:href="#rail" href="#rail"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.54;0.57;0.84;0.9;1" dur="9s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
